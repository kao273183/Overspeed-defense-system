<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <style>
    body { background: #0d0d0d; color: #888; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .box { text-align: center; }
    .spinner { width: 32px; height: 32px; border: 3px solid #333; border-top-color: #E31937; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <p>正在返回 App...</p>
  </div>
  <script>
    var params = window.location.search;
    var hash = window.location.hash;
    window.location.href = 'nokou://tesla-callback' + params + hash;
  </script>
</body>
</html>
